<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Scommettiamo</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --g:#00e676;--gd:#00c853;--gb:rgba(0,230,118,.1);
  --bg:#070b12;--c1:#0d1421;--c2:#0a1019;
  --br:rgba(255,255,255,.08);
  --tx:#f1f5ff;--mu:#6b7fa3;--m2:#3d4e6b;
  --ye:#fbbf24;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--tx);font-family:'Outfit',sans-serif;min-height:100vh;position:relative}

body::before{content:'';position:fixed;inset:0;
  background:radial-gradient(circle at 20% 20%,rgba(0,230,118,.03) 0%,transparent 50%);
  pointer-events:none;z-index:-1}

.page{position:relative;z-index:1;padding:20px 16px 100px;display:flex;justify-content:center}
.wrap{width:100%;max-width:460px}

/* HEADER */
.hdr{padding:16px 0 24px;text-align:center}
.hdr-chip{display:inline-flex;align-items:center;gap:6px;background:var(--gb);border:1px solid rgba(0,230,118,.2);color:var(--g);font-size:0.68rem;font-weight:600;letter-spacing:1.5px;padding:5px 14px;border-radius:99px;margin-bottom:12px}
.live-dot{width:6px;height:6px;background:var(--g);border-radius:50%;animation:pulse 1.8s infinite}
.hdr-title{font-size:2.55rem;font-weight:900;letter-spacing:-1.2px;line-height:1;margin-bottom:6px}
.hdr-title span{background:linear-gradient(135deg,var(--tx) 30%,var(--g));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hdr-sub{color:var(--mu);font-size:0.78rem}

/* CONFIG */
.card{background:var(--c1);border:1px solid var(--br);border-radius:18px;padding:18px;margin-bottom:20px}
.field-label{color:var(--mu);font-size:0.68rem;font-weight:600;letter-spacing:1px;text-transform:uppercase;margin-bottom:6px}
input[type=text]{
  width:100%;background:var(--c2);border:1px solid var(--br);border-radius:12px;
  padding:12px 14px;color:var(--tx);font-size:0.85rem;outline:none;
}
input:focus{border-color:var(--g);background:rgba(0,230,118,.03)}

/* PULSANTE */
.top-btn{
  width:100%;background:var(--c1);border:2px solid var(--br);border-radius:16px;
  padding:18px 16px;color:var(--tx);font-weight:700;font-size:1rem;
  cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;
  margin-bottom:20px;transition:all .25s;position:relative;z-index:10;
}
.top-btn:hover{border-color:var(--g);color:var(--g);transform:translateY(-2px)}

/* ERROR */
.err-box{background:rgba(244,63,94,.08);border:1px solid rgba(244,63,94,.25);border-radius:14px;padding:14px 16px;color:#fb7185;font-size:0.85rem;margin-bottom:16px;display:none;gap:8px}
.err-box.show{display:flex;align-items:center}

/* RISULTATI */
.result-card{background:var(--c1);border:1px solid var(--br);border-radius:16px;padding:20px;margin-bottom:16px}
.pick{
  background:var(--c2);border-radius:12px;padding:14px;margin-bottom:10px;
  border-left:4px solid var(--g);
}
.pick-league{font-size:0.82rem;font-weight:700;color:var(--mu);margin-bottom:4px}
.pick-match{font-weight:700;font-size:0.96rem;margin-bottom:8px;line-height:1.3}
.pick-market{font-size:0.85rem;color:var(--g);font-weight:600;margin-bottom:6px}
.pick-odd{font-size:1.4rem;font-weight:900;color:var(--ye);margin-bottom:8px}
.bar-container{margin-top:8px;height:6px;background:rgba(255,255,255,0.08);border-radius:9999px;overflow:hidden}
.bar-fill{height:100%;background:var(--g);transition:width 0.6s}
</style>
</head>
<body>
<div class="page"><div class="wrap">

  <!-- HEADER -->
  <div class="hdr">
    <div class="hdr-chip"><span class="live-dot"></span>Live Analysis</div>
    <h1 class="hdr-title"><span>Scommettiamo</span></h1>
    <p class="hdr-sub">Poisson · Dixon-Coles · SofaScore</p>
  </div>

  <!-- CONFIG -->
  <div class="card">
    <span class="field-label">Backend Railway URL</span>
    <input type="text" id="backendUrl" placeholder="https://tuoapp.up.railway.app">
    <span id="urlSaved" style="display:none;color:var(--g);font-size:0.7rem;margin-top:6px">✓ URL salvato</span>
  </div>

  <!-- PULSANTE TOP 20 -->
  <button onclick="loadTopGoals()" id="topBtn" class="top-btn">
    🎯 Top 20 Partite Over 2.5 / GG 
    <span style="font-size:0.78rem;opacity:0.85">(quota 1.80–2.20)</span>
  </button>

  <!-- ERROR -->
  <div class="err-box" id="errBox"><span>⚠️</span><span id="errMsg"></span></div>

  <!-- RISULTATI -->
  <div id="topGoalsResults"></div>

</div></div>

<script>
function saveUrl(){
  const bu = document.getElementById('backendUrl').value.trim().replace(/\/$/, '');
  if(bu) {
    localStorage.setItem('backendUrl', bu);
    document.getElementById('urlSaved').style.display = 'block';
  }
}

window.onload = () => {
  const saved = localStorage.getItem('backendUrl');
  if(saved) {
    document.getElementById('backendUrl').value = saved;
    document.getElementById('urlSaved').style.display = 'block';
  }
};

function showErr(msg){
  const box = document.getElementById('errBox');
  box.classList.add('show');
  document.getElementById('errMsg').textContent = msg;
}
function hideErr(){
  document.getElementById('errBox').classList.remove('show');
}

function fmtDate(iso){
  if(!iso) return '';
  const d = new Date(iso);
  return d.toLocaleDateString('it-IT', {weekday:'short', day:'numeric', month:'short', hour:'2-digit', minute:'2-digit'});
}

async function loadTopGoals(){
  hideErr();
  const bu = document.getElementById('backendUrl').value.trim().replace(/\/$/, '');
  
  if(!bu){
    showErr('Inserisci l\'URL del tuo backend Railway');
    return;
  }

  saveUrl();

  const btn = document.getElementById('topBtn');
  const originalHTML = btn.innerHTML;
  btn.disabled = true;
  btn.style.opacity = '0.6';
  btn.innerHTML = '⏳ Caricamento...';

  document.getElementById('topGoalsResults').innerHTML = '';

  try {
    const response = await fetch(`${bu}/top-goals?odds_min=1.80&odds_max=2.20&top=20`);
    const data = await response.json();

    if(data.error){
      showErr(data.error);
      return;
    }

    const picks = data.picks || [];
    if(picks.length === 0){
      document.getElementById('topGoalsResults').innerHTML = `<div class="err-box show">Nessuna partita trovata.</div>`;
      return;
    }

    let html = `<div class="result-card">
      <div style="margin-bottom:16px;font-weight:700;font-size:1.05rem">🎯 Top ${picks.length} Partite • ${data.day || 'Oggi'}</div>`;

    picks.forEach((p) => {
      const pct = Math.round(p.prob * 100) || 0;
      const isValue = p.edge > 0.02;
      const marketName = p.market || p.name || 'Over 2.5 / GG';

      html += `
        <div class="pick">
          <div class="pick-league">${p.league || 'Campionato'}</div>
          <div class="pick-match">${p.match}</div>
          
          <div class="pick-market">
            ${marketName} 
            ${isValue ? '<span style="background:rgba(0,230,118,0.15);color:var(--g);font-size:0.68rem;padding:2px 8px;border-radius:4px;margin-left:6px">VALUE</span>' : ''}
          </div>
          
          <div style="display:flex;justify-content:space-between;align-items:end">
            <div style="font-size:1.4rem;font-weight:900;color:var(--ye)">@${p.odds}</div>
            <div style="text-align:right">
              <div style="color:var(--g);font-weight:600;font-size:0.95rem">${pct}%</div>
              <div style="color:var(--mu);font-size:0.7rem">${fmtDate(p.commence_time)}</div>
            </div>
          </div>
          
          <div class="bar-container">
            <div class="bar-fill" style="width:${pct}%"></div>
          </div>
        </div>`;
    });

    html += `</div>`;
    document.getElementById('topGoalsResults').innerHTML = html;

  } catch(e) {
    showErr('Errore di connessione: ' + e.message);
  } finally {
    btn.disabled = false;
    btn.style.opacity = '1';
    btn.innerHTML = originalHTML;
  }
}
</script>
</body>
</html>
