<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scommettiamo Pro</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: #fff;
    margin: 0;
}

.container {
    max-width: 600px;
    margin: 40px auto;
    background: #1e293b;
    padding: 25px;
    border-radius: 12px;
}

h1 {
    text-align: center;
    margin-bottom: 20px;
}

input, select {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
    border-radius: 6px;
    border: none;
}

button {
    width: 100%;
    padding: 12px;
    background: #22c55e;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    cursor: pointer;
}

.result {
    margin-top: 20px;
    padding: 15px;
    background: #334155;
    border-radius: 8px;
}

.label {
    font-size: 14px;
    color: #94a3b8;
}
</style>
</head>

<body>

<div class="container">

<h1>⚽ Scommettiamo PRO</h1>

<div class="label">Quota Over 2.5</div>
<input type="number" id="over" step="0.01">

<div class="label">Quota Gol-Gol</div>
<input type="number" id="gg" step="0.01">

<div class="label">Media gol casa</div>
<input type="number" id="home" step="0.1">

<div class="label">Media gol trasferta</div>
<input type="number" id="away" step="0.1">

<button onclick="calcola()">Calcola Pronostico</button>

<div class="result" id="output">
Inserisci i dati per ottenere un pronostico
</div>

</div>

<script>
function calcola() {

let over = parseFloat(document.getElementById("over").value);
let gg = parseFloat(document.getElementById("gg").value);
let home = parseFloat(document.getElementById("home").value);
let away = parseFloat(document.getElementById("away").value);

if(!over || !gg || !home || !away){
    document.getElementById("output").innerHTML = "⚠️ Inserisci tutti i dati";
    return;
}

// Probabilità implicita
let probOver = (1 / over) * 100;
let probGG = (1 / gg) * 100;

// Indicatore offensivo
let attacco = home + away;

// Logica migliorata
let risultato = "";

if(attacco > 2.8 && probOver > 55){
    risultato = "🔥 OVER 2.5 CONSIGLIATO";
}
else if(attacco > 2.4 && probGG > 52){
    risultato = "⚽ GOL-GOL CONSIGLIATO";
}
else{
    risultato = "⚠️ PARTITA INCERTA - EVITA";
}

document.getElementById("output").innerHTML = `
<b>Probabilità Over:</b> ${probOver.toFixed(1)}%<br>
<b>Probabilità GG:</b> ${probGG.toFixed(1)}%<br>
<b>Indice Attacco:</b> ${attacco.toFixed(2)}<br><br>
<b>${risultato}</b>
`;

}
</script>

</body>
</html>
