<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Scommettiamo</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --g:#00e676;--gd:#00c853;--gb:rgba(0,230,118,.1);--glow:rgba(0,230,118,.25);
  --bg:#070b12;--c1:#0d1421;--c2:#0a1019;--c3:#111827;
  --br:rgba(255,255,255,.06);--br2:rgba(255,255,255,.1);
  --tx:#f1f5ff;--mu:#6b7fa3;--m2:#3d4e6b;
  --ye:#fbbf24;--re:#f43f5e;--or:#f97316;--pu:#a78bfa;--bl:#38bdf8;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--tx);font-family:'Outfit',sans-serif;min-height:100vh}

/* mesh bg */
body::before{content:'';position:fixed;inset:0;
  background:radial-gradient(circle at 20% 20%,rgba(0,230,118,.04) 0%,transparent 50%),
             radial-gradient(circle at 80% 80%,rgba(56,189,148,.03) 0%,transparent 50%);
  pointer-events:none;z-index:0}

@keyframes spin{to{transform:rotate(360deg)}}
@keyframes up{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

.page{position:relative;z-index:1;padding:20px 16px 80px;display:flex;justify-content:center}
.wrap{width:100%;max-width:460px}

/* HEADER */
.hdr{padding:16px 0 24px;text-align:center}
.hdr-chip{display:inline-flex;align-items:center;gap:5px;background:var(--gb);border:1px solid rgba(0,230,118,.15);color:var(--g);font-size:.65rem;font-weight:600;letter-spacing:1.5px;padding:4px 12px;border-radius:99px;margin-bottom:14px;text-transform:uppercase}
.live-dot{width:5px;height:5px;background:var(--g);border-radius:50%;animation:pulse 1.5s infinite}
.hdr-title{font-size:2.6rem;font-weight:900;letter-spacing:-1px;line-height:1;margin-bottom:6px}
.hdr-title span{background:linear-gradient(135deg,var(--tx) 30%,var(--g));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hdr-sub{color:var(--mu);font-size:.75rem;font-weight:400}

/* CARD */
.card{background:var(--c1);border:1px solid var(--br);border-radius:18px;padding:18px;margin-bottom:10px}

/* FIELDS */
.field-label{color:var(--mu);font-size:.65rem;font-weight:600;letter-spacing:1px;text-transform:uppercase;margin-bottom:6px;display:block}
.field-wrap{display:flex;gap:6px;margin-bottom:4px}
input[type=password],input[type=text]{
  flex:1;background:var(--c2);border:1px solid var(--br);border-radius:12px;
  padding:11px 13px;color:var(--tx);font-size:.82rem;outline:none;
  font-family:'Outfit',monospace;transition:all .2s;
}
input::placeholder{color:var(--m2)}
input:focus{border-color:rgba(0,230,118,.35);background:rgba(0,230,118,.03)}
.xbtn{background:transparent;border:1px solid var(--br);color:var(--mu);border-radius:12px;padding:0 11px;cursor:pointer;font-size:12px;transition:all .2s;flex-shrink:0}
.xbtn:active{color:var(--re)}
.saved-tag{color:var(--g);font-size:.65rem;font-weight:600;display:none;align-items:center;gap:3px}
.saved-tag.show{display:inline-flex}
.field-hint{color:var(--m2);font-size:.65rem;margin-top:8px;line-height:1.6}
.field-hint a{color:var(--g);text-decoration:none;font-weight:500}
.divider{height:1px;background:var(--br);margin:14px 0}

/* BUTTON */
.gbtn{
  width:100%;background:var(--g);border:none;border-radius:14px;
  padding:16px;color:#000;font-weight:700;font-size:.95rem;
  cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;
  margin-bottom:12px;font-family:'Outfit',sans-serif;letter-spacing:.3px;
  transition:all .2s;position:relative;overflow:hidden;
}
.gbtn:hover:not(:disabled){background:var(--gd);box-shadow:0 8px 24px var(--glow);transform:translateY(-1px)}
.gbtn:active{transform:translateY(1px);box-shadow:none}
.gbtn:disabled{opacity:.45;cursor:not-allowed;transform:none;box-shadow:none}
.spin{width:15px;height:15px;border:2px solid rgba(0,0,0,.25);border-top-color:#000;border-radius:50%;animation:spin .7s linear infinite}

/* ERROR */
.err-box{background:rgba(244,63,94,.07);border:1px solid rgba(244,63,94,.2);border-radius:14px;padding:13px 15px;color:#fb7185;font-size:.8rem;margin-bottom:12px;display:none;gap:8px;animation:up .3s ease}
.err-box.show{display:flex}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:18px;display:none}
.stats.show{display:grid}
.stat-card{background:var(--c1);border:1px solid var(--br);border-radius:14px;padding:12px 8px;text-align:center}
.stat-n{font-size:1.7rem;font-weight:800;color:var(--g);line-height:1}
.stat-l{color:var(--mu);font-size:.6rem;font-weight:500;letter-spacing:.5px;margin-top:3px;text-transform:uppercase}

/* DAY BANNER */
.day-banner{display:flex;align-items:center;gap:10px;margin-bottom:14px;color:var(--mu);font-size:.7rem;font-weight:500;letter-spacing:.5px;text-transform:uppercase}
.day-banner::before,.day-banner::after{content:'';flex:1;height:1px;background:var(--br)}

/* TABS */
.tabs{display:flex;gap:6px;margin-bottom:14px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{
  flex-shrink:0;display:flex;align-items:center;gap:5px;
  padding:8px 14px;border-radius:99px;border:1px solid var(--br);
  background:var(--c1);color:var(--mu);font-size:.75rem;font-weight:600;
  cursor:pointer;transition:all .2s;white-space:nowrap;
}
.tab.on{border-color:var(--tc);color:var(--tc);background:rgba(255,255,255,.03)}

/* PANEL */
.panel{display:none;animation:up .25s ease}
.panel.on{display:block}

/* COMBO HEADER */
.combo-hdr{display:flex;justify-content:space-between;align-items:flex-start;background:var(--c1);border:1px solid var(--br);border-radius:16px;padding:16px;margin-bottom:10px}
.combo-left .combo-name{font-size:.65rem;font-weight:600;color:var(--mu);letter-spacing:1px;text-transform:uppercase;margin-bottom:4px}
.combo-left .combo-picks{font-size:.72rem;color:var(--m2);margin-top:4px}
.combo-quota{text-align:right}
.combo-quota .cq-val{font-size:2.6rem;font-weight:900;line-height:1;letter-spacing:-1px}
.combo-quota .cq-lbl{font-size:.62rem;color:var(--mu);margin-top:2px}

/* PICK CARD - MIGLIORATA */
.pick{
  background:var(--c2);border:1px solid var(--br);border-radius:16px;
  padding:16px;margin-bottom:10px;position:relative;overflow:hidden;
}
.pick-accent{
  position:absolute;left:0;top:0;bottom:0;width:4px;
  border-radius:4px 0 0 4px;
}
.pick-head{
  display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;
}
.pick-league{
  font-size:0.78rem;font-weight:700;letter-spacing:0.5px;display:flex;align-items:center;gap:6px;
}
.pick-league .flag{font-size:1.1rem}
.pick-time{font-size:0.68rem;color:var(--mu);font-weight:500}

.pick-match{
  font-weight:700;font-size:0.95rem;line-height:1.3;margin-bottom:8px;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
.pick-market{
  display:flex;align-items:center;gap:8px;font-size:0.78rem;color:var(--mu);margin-bottom:12px;
}
.pick-odd{
  font-size:1.55rem;font-weight:900;color:var(--ye);letter-spacing:-0.6px;
}

.vbdg{
  background:rgba(0,230,118,.12);border:1px solid rgba(0,230,118,.35);
  color:var(--g);font-size:0.62rem;font-weight:700;padding:2px 8px;border-radius:6px;
}
.nvbdg{
  background:rgba(249,115,22,.08);border:1px solid rgba(249,115,22,.25);
  color:var(--or);font-size:0.62rem;font-weight:700;padding:2px 8px;border-radius:6px;
}

/* Statistiche migliorate */
.pick-bars{
  display:flex;flex-direction:column;gap:9px;margin:14px 0;
}
.bar-row{
  display:flex;align-items:center;gap:10px;
}
.bar-lbl{
  font-size:0.68rem;color:var(--mu);width:78px;flex-shrink:0;font-weight:500;
}
.bar-track{
  flex:1;background:rgba(255,255,255,.06);border-radius:99px;height:6px;
}
.bar-fill{
  height:6px;border-radius:99px;transition:width .8s ease;
}
.bar-val{
  font-size:0.75rem;font-weight:700;width:38px;text-align:right;flex-shrink:0;
}

/* Mini stats */
.pick-minis{
  display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding-top:12px;
  border-top:1px solid var(--br);
}
.mini{
  background:rgba(255,255,255,.025);border-radius:10px;padding:8px 6px;text-align:center;
}
.mini-v{font-size:0.92rem;font-weight:700}
.mini-v.ok{color:var(--g)}
.mini-v.warn{color:var(--ye)}
.mini-v.bad{color:var(--re)}
.mini-l{font-size:0.58rem;color:var(--mu);margin-top:2px;line-height:1.1}

/* TOTAL */
.total-bar{
  display:flex;justify-content:space-between;align-items:center;
  background:var(--gb);border:1px solid rgba(0,230,118,.15);
  border-radius:14px;padding:14px 16px;margin-top:6px;
}
.total-info .tl{font-size:0.65rem;font-weight:600;letter-spacing:1px;color:var(--mu);text-transform:uppercase}
.total-info .ts{font-size:0.62rem;color:var(--m2);margin-top:3px}
.total-val{font-size:2.45rem;font-weight:900;color:var(--g);letter-spacing:-1px;line-height:1}
</style>
</head>
<body>
<div class="page"><div class="wrap">

<!-- HEADER (rimane uguale) -->
<div class="hdr">
  <div class="hdr-chip"><span class="live-dot"></span>Live Analysis</div>
  <h1 class="hdr-title"><span>Scommettiamo</span></h1>
  <p class="hdr-sub">Poisson · Dixon-Coles · SofaScore · Tutti i campionati</p>
</div>

<!-- CONFIG CARD (rimane uguale) -->
<div class="card">
  <span class="field-label">Backend Railway</span>
  <div class="field-wrap">
    <input type="text" id="backendUrl" placeholder="https://tuoapp.up.railway.app">
  </div>
  <span class="saved-tag" id="urlSaved">✓ Salvato</span>
  <div class="field-hint">
    Nessuna API key necessaria — i dati vengono da SofaScore gratuitamente.<br>
    <a href="https://railway.app" target="_blank">Railway →</a>
  </div>
</div>

<button class="gbtn" id="gbtn" onclick="gen()">⚽ &nbsp;Genera Tutte le Multipla</button>

<div class="err-box" id="errBox"><span>⚠️</span><span id="errMsg"></span></div>

<div class="stats" id="sbar">
  <div class="stat-card"><div class="stat-n" id="sL">0</div><div class="stat-l">Campionati</div></div>
  <div class="stat-card"><div class="stat-n" id="sM">0</div><div class="stat-l">Partite</div></div>
  <div class="stat-card"><div class="stat-n" id="sV">0</div><div class="stat-l">Value Bet</div></div>
</div>

<button onclick="loadTopGoals()" id="topBtn" style="width:100%;background:transparent;border:1px solid var(--br);border-radius:14px;padding:14px;color:var(--mu);font-weight:600;font-size:.9rem;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:12px">
  🎯 Top 20 Partite Over 2.5 / GG  <span style="font-size:.7rem;color:var(--m2)">(quota 1.80–2.20)</span>
</button>

<div id="topGoalsResults"></div>
<div id="results"></div>

</div></div>

<script>
// ... (tutto il resto del tuo script rimane identico fino a buildPanel)

// SOSTITUISCI la funzione buildPanel con questa versione migliorata:

function buildPanel(m){
  const tc = TC[m.target] || TC[3];
  const icon = ICON[m.target] || '⚡';
  const prob = m.combo_probability || 0;
  const vcount = m.value_in_combo || 0;

  let picks = '';
  m.picks.forEach((p, i) => {
    const pct = Math.round(p.prob * 100);
    const o25 = Math.round((p.probs?.over25 || 0) * 100);
    const gg  = Math.round((p.probs?.gg || 0) * 100);
    const eg  = p.exp_g || '—';
    const isVal = p.edge > 0.02;

    // Estrai la bandiera dal nome della lega (es: "🇮🇹 Serie A")
    const leagueParts = p.league.split(' ');
    const flag = leagueParts[0].match(/[\uD83C][\uDDE6-\uDDFF][\uD83C][\uDDE6-\uDDFF]/) ? leagueParts[0] : '⚽';
    const leagueName = leagueParts.slice(1).join(' ') || leagueParts[0];

    picks += `
      <div class="pick">
        <div class="pick-accent" style="background:${tc}"></div>
        
        <div class="pick-head">
          <span class="pick-league">
            <span class="flag">${flag}</span>
            <span>${leagueName}</span>
          </span>
          <span class="pick-time">${fmtDate(p.commence_time)}</span>
        </div>

        <div class="pick-match">${p.match}</div>

        <div class="pick-market">
          ${p.name}
          ${isVal ? 
            '<span class="vbdg">VALUE</span>' : 
            '<span class="nvbdg">NO VALUE</span>'
          }
        </div>

        <div class="pick-odd">@${p.odds}</div>

        <div class="pick-bars">
          <div class="bar-row">
            <span class="bar-lbl">Probabilità</span>
            <div class="bar-track"><div class="bar-fill" style="width:\( {pct}%;background: \){tc}"></div></div>
            <span class="bar-val" style="color:\( {tc}"> \){pct}%</span>
          </div>
          <div class="bar-row">
            <span class="bar-lbl">Over 2.5</span>
            <div class="bar-track"><div class="bar-fill" style="width:${o25}%"></div></div>
            <span class="bar-val">${o25}%</span>
          </div>
          <div class="bar-row">
            <span class="bar-lbl">Goal/Goal</span>
            <div class="bar-track"><div class="bar-fill" style="width:${gg}%"></div></div>
            <span class="bar-val">${gg}%</span>
          </div>
        </div>

        <div class="pick-minis">
          <div class="mini">
            <div class="mini-v \( {parseFloat(eg)>2.5?'ok':parseFloat(eg)>1.8?'warn':'bad'}"> \){eg}</div>
            <div class="mini-l">Gol attesi</div>
          </div>
          <div class="mini">
            <div class="mini-v">${Math.round((p.home_form||0)*100)}%</div>
            <div class="mini-l">Forma casa</div>
          </div>
          <div class="mini">
            <div class="mini-v">${Math.round((p.away_form||0)*100)}%</div>
            <div class="mini-l">Trasferta</div>
          </div>
        </div>
      </div>`;
  });

  return `
    <div class="panel" data-t="${m.target}">
      <div class="combo-hdr">
        <div class="combo-left">
          <div class="combo-name">\( {icon} Multipla x \){m.target}</div>
          <div style="font-size:1.85rem;font-weight:900;color:\( {tc};letter-spacing:-1.2px;line-height:1"> \){m.total_odds}</div>
          <div class="combo-picks">${m.picks.length} selezioni · ${vcount} value bet</div>
        </div>
        <div style="text-align:right">
          <div style="font-size:0.68rem;color:var(--mu);margin-bottom:6px;letter-spacing:0.6px">PROB. VINCITA</div>
          <div style="font-size:2.1rem;font-weight:900;color:\( {tc};line-height:1"> \){prob}%</div>
        </div>
      </div>
      ${picks}
      <div class="total-bar">
        <div class="total-info">
          <div class="tl">Quota Totale</div>
          <div class="ts">${m.picks.length} eventi · prob. ${prob}%</div>
        </div>
        <div class="total-val" style="color:\( {tc}"> \){m.total_odds}</div>
      </div>
    </div>`;
}
</script>
</body>
</html>
