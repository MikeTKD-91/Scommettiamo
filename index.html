<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Scommettiamo</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --g:#00e676;--gd:#00c853;--gb:rgba(0,230,118,.12);
  --bg:#070b12;--c1:#0d1421;--c2:#0a1019;
  --br:rgba(255,255,255,.09);
  --tx:#f1f5ff;--mu:#6b7fa3;--ye:#fbbf24;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--tx);font-family:'Outfit',sans-serif;min-height:100vh;line-height:1.4}

.page{padding:20px 16px 100px;max-width:460px;margin:0 auto}

/* HEADER */
.hdr{text-align:center;padding:16px 0 20px}
.hdr-chip{background:var(--gb);color:var(--g);font-size:0.7rem;font-weight:600;padding:6px 14px;border-radius:99px;display:inline-flex;align-items:center;gap:6px}
.live-dot{width:7px;height:7px;background:var(--g);border-radius:50%;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}

.hdr-title{font-size:2.6rem;font-weight:900;letter-spacing:-1.5px}
.hdr-title span{background:linear-gradient(135deg,#fff,var(--g));-webkit-background-clip:text;-webkit-text-fill-color:transparent}

/* CONFIG */
.card{background:var(--c1);border:1px solid var(--br);border-radius:16px;padding:18px;margin-bottom:20px}
.field-label{color:var(--mu);font-size:0.7rem;font-weight:600;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}

/* PULSANTE */
.top-btn{
  width:100%;background:var(--c1);border:2px solid var(--br);border-radius:16px;
  padding:18px;color:var(--tx);font-weight:700;font-size:1.05rem;
  cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;
  transition:all .3s;
}
.top-btn:hover{border-color:var(--g);color:var(--g)}

/* ERROR */
.err-box{background:rgba(244,63,94,.1);border:1px solid rgba(244,63,94,.3);border-radius:14px;padding:14px;color:#fb7185;display:none}
.err-box.show{display:block}

/* RISULTATI */
.result-card{background:var(--c1);border:1px solid var(--br);border-radius:16px;padding:20px}
.pick{
  background:var(--c2);border-radius:14px;padding:16px;margin-bottom:12px;
  border-left:5px solid var(--g);
}
.pick-league{font-size:0.82rem;color:var(--mu);font-weight:600;margin-bottom:6px}
.pick-match{font-size:1rem;font-weight:700;margin-bottom:10px}
.pick-market{font-size:0.95rem;font-weight:600;color:var(--g);margin-bottom:8px}
.pick-info{display:flex;justify-content:space-between;align-items:flex-end}
.pick-odd{font-size:1.45rem;font-weight:900;color:var(--ye)}
.pick-prob{font-size:1.1rem;font-weight:700;color:var(--g)}
.pick-time{color:var(--mu);font-size:0.78rem}
.bar-container{height:7px;background:rgba(255,255,255,0.1);border-radius:999px;margin-top:12px;overflow:hidden}
.bar-fill{height:100%;background:linear-gradient(90deg,var(--g),#38bdf8);transition:width .8s ease}
.pick-kelly{font-size:0.78rem;color:#a78bfa;font-weight:600;margin-top:8px;display:flex;align-items:center;gap:6px}
.pick-kelly span.kelly-badge{background:rgba(167,139,250,0.15);color:#a78bfa;border-radius:6px;padding:2px 8px;font-size:0.72rem}
.pick-kelly span.kelly-stake{color:#f1f5ff;font-weight:700}

/* TOP VALUE */
.value-pick{
  background:var(--c2);border-radius:14px;padding:16px;margin-bottom:12px;
  border-left:5px solid #a78bfa;
}
.rank-badge{
  display:inline-flex;align-items:center;justify-content:center;
  width:26px;height:26px;border-radius:50%;
  background:linear-gradient(135deg,#a78bfa,#7c3aed);
  color:#fff;font-size:0.75rem;font-weight:800;margin-right:8px;flex-shrink:0;
}
.edge-bar-container{height:5px;background:rgba(167,139,250,0.15);border-radius:999px;margin-top:10px;overflow:hidden}
.edge-bar-fill{height:100%;background:linear-gradient(90deg,#a78bfa,#38bdf8);transition:width .8s ease}
</style>
</head>
<body>
<div class="page">

  <div class="hdr">
    <div class="hdr-chip"><span class="live-dot"></span>Live Analysis</div>
    <h1 class="hdr-title"><span>Scommettiamo</span></h1>
    <p style="color:var(--mu);margin-top:4px">Poisson · Dixon-Coles · SofaScore</p>
  </div>

  <div class="card">
    <span class="field-label">Backend Railway URL</span>
    <input type="text" id="backendUrl" placeholder="https://tuoapp.up.railway.app" style="width:100%;padding:12px;border-radius:10px;border:1px solid var(--br);background:var(--c2);color:var(--tx);font-size:0.9rem">
    <span id="urlSaved" style="display:none;color:#00e676;font-size:0.75rem;margin-top:8px">✓ URL salvato</span>
  </div>

  <div class="card">
    <span class="field-label">💰 Bankroll (€)</span>
    <input type="number" id="bankroll" placeholder="es. 100" min="1" step="1"
      style="width:100%;padding:12px;border-radius:10px;border:1px solid var(--br);background:var(--c2);color:var(--tx);font-size:0.9rem"
      oninput="localStorage.setItem('bankroll', this.value)">
    <p style="color:var(--mu);font-size:0.72rem;margin-top:6px">Usato per calcolare la puntata Kelly consigliata su ogni pick</p>
  </div>

  <button onclick="loadTopValue()" id="valueBtn" class="top-btn" style="border-color:rgba(167,139,250,0.3);margin-bottom:12px">
    💎 Top 5 VALUE Singole
    <span style="font-size:0.8rem;opacity:0.8">per bankroll piccoli</span>
  </button>

  <button onclick="loadTopGoals()" id="topBtn" class="top-btn">
    ⚽ Top 10 Goal/Goal
    <span style="font-size:0.8rem;opacity:0.8">(quota 2.00–2.20)</span>
  </button>

  <div class="err-box" id="errBox"><strong>⚠️</strong> <span id="errMsg"></span></div>

  <div id="topValueResults"></div>
  <div id="topGoalsResults"></div>

</div>

<script>
function saveUrl() {
  const url = document.getElementById('backendUrl').value.trim().replace(/\/$/, '');
  if (url) {
    localStorage.setItem('backendUrl', url);
    document.getElementById('urlSaved').style.display = 'block';
  }
}

window.onload = () => {
  const saved = localStorage.getItem('backendUrl');
  if (saved) {
    document.getElementById('backendUrl').value = saved;
    document.getElementById('urlSaved').style.display = 'block';
  }
  const bk = localStorage.getItem('bankroll');
  if (bk) document.getElementById('bankroll').value = bk;
};

function showErr(msg) {
  document.getElementById('errBox').classList.add('show');
  document.getElementById('errMsg').textContent = msg;
}
function hideErr() {
  document.getElementById('errBox').classList.remove('show');
}

function fmtDate(iso) {
  if (!iso) return '';
  return new Date(iso).toLocaleDateString('it-IT', {
    weekday: 'short', day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit'
  });
}

async function loadTopValue() {
  hideErr();
  const bu = document.getElementById('backendUrl').value.trim().replace(/\/$/, '');
  if (!bu) { showErr("Inserisci l'URL del backend Railway"); return; }
  saveUrl();

  const btn = document.getElementById('valueBtn');
  const original = btn.innerHTML;
  btn.disabled = true;
  btn.innerHTML = '⏳ Analisi in corso...';
  document.getElementById('topValueResults').innerHTML = '';

  try {
    const res  = await fetch(`${bu}/top-value?top=5&min_edge=0.02`);
    const data = await res.json();
    if (data.error) { showErr(data.error); return; }

    const picks    = data.picks || [];
    const bankroll = parseFloat(document.getElementById('bankroll').value) || 0;
    const totalKelly = picks.reduce((s, p) => s + (p.kelly_fraction || 0), 0);
    const totalStake = bankroll > 0 ? (totalKelly * bankroll).toFixed(2) : null;

    let html = `
      <div class="result-card" style="border-color:rgba(167,139,250,0.25)">
        <div style="font-size:1.1rem;font-weight:700;margin-bottom:4px">
          💎 Top ${picks.length} VALUE • ${data.day || 'Oggi'}
        </div>
        <div style="color:var(--mu);font-size:0.78rem;margin-bottom:18px">
          ${data.total_analyzed} partite analizzate · ${data.total_value} con edge positivo
          ${totalStake ? `· <strong style="color:#a78bfa">Puntata totale consigliata: €${totalStake}</strong>` : ''}
        </div>`;

    picks.forEach(p => {
      const prob     = parseFloat(p.probability);
      const edgePct  = parseFloat(p.edge_pct);
      const kf       = p.kelly_fraction || 0;
      const kellyEur = bankroll > 0 ? (kf * bankroll).toFixed(2) : null;
      // edge bar: scala 0-15% come 100%
      const edgeBar  = Math.min(edgePct / 15 * 100, 100).toFixed(0);

      html += `
        <div class="value-pick">
          <div style="display:flex;align-items:center;margin-bottom:6px">
            <span class="rank-badge">${p.rank}</span>
            <span style="color:var(--mu);font-size:0.8rem;font-weight:600">${p.league}</span>
          </div>
          <div class="pick-match">${p.match}</div>
          <div class="pick-market" style="color:#a78bfa;margin-bottom:8px">
            ${p.market}
            <span style="background:rgba(167,139,250,0.18);color:#a78bfa;font-size:0.7rem;padding:2px 8px;border-radius:6px;margin-left:6px">
              Edge +${p.edge_pct}
            </span>
          </div>

          <div class="pick-info">
            <div>
              <span class="pick-odd">@${p.odds}</span>
            </div>
            <div style="text-align:right">
              <span class="pick-prob" style="color:#a78bfa">${p.probability}</span><br>
              <span class="pick-time">${fmtDate(p.commence_time)}</span>
            </div>
          </div>

          <div class="pick-kelly" style="margin-top:10px">
            <span class="kelly-badge">Kelly ¼</span>
            <span>${p.kelly_pct} del bankroll</span>
            ${kellyEur ? `<span class="kelly-stake">→ €${kellyEur}</span>` : ''}
          </div>

          <div class="edge-bar-container">
            <div class="edge-bar-fill" style="width:${edgeBar}%"></div>
          </div>
        </div>`;
    });

    html += `
      <div style="color:var(--mu);font-size:0.72rem;text-align:center;margin-top:8px;padding:0 8px">
        ⚡ Gioca ogni singola separatamente · Non combinare in multipla · Rispetta il Kelly
      </div>
    </div>`;
    document.getElementById('topValueResults').innerHTML = html;

  } catch(e) {
    showErr("Errore di connessione al backend: " + e.message);
  } finally {
    btn.disabled = false;
    btn.innerHTML = original;
  }
}

async function loadTopGoals() {
  hideErr();
  const bu = document.getElementById('backendUrl').value.trim().replace(/\/$/, '');
  if (!bu) {
    showErr("Inserisci l'URL del backend Railway");
    return;
  }
  saveUrl();

  const btn = document.getElementById('topBtn');
  const original = btn.innerHTML;
  btn.disabled = true;
  btn.innerHTML = '⏳ Caricamento in corso...';

  document.getElementById('topGoalsResults').innerHTML = '';

  try {
    const res = await fetch(`${bu}/top-goals?odds_min=2.00&odds_max=2.20&top=10`);
    const data = await res.json();

    if (data.error) {
      showErr(data.error);
      return;
    }

    const picks = data.picks || [];
    if (picks.length === 0) {
      document.getElementById('topGoalsResults').innerHTML = `<div class="err-box show">Nessuna partita trovata nel range quota.</div>`;
      return;
    }

    let html = `
      <div class="result-card">
        <div style="font-size:1.1rem;font-weight:700;margin-bottom:18px">
          ⚽ Top ${picks.length} Goal/Goal • ${data.day || 'Prossimi giorni'}
        </div>`;

    picks.forEach(p => {
      const prob = Math.round((p.prob_raw || p.prob || 0) * 100);
      const isValue = (p.edge || 0) > 0.02;
      const market = p.name || p.market || "Over 2.5 / GG";
      const bankroll = parseFloat(document.getElementById('bankroll').value) || 0;
      const kf = p.kelly_fraction || 0;
      const kellyPct = (kf * 100).toFixed(1);
      const kellyEur = bankroll > 0 ? (kf * bankroll).toFixed(2) : null;

      html += `
        <div class="pick">
          <div class="pick-league">${p.league || 'Campionato'}</div>
          <div class="pick-match">${p.match}</div>
          <div class="pick-market">
            ${market}
            ${isValue ? `<span style="background:rgba(0,230,118,0.2);color:var(--g);font-size:0.7rem;padding:2px 8px;border-radius:6px;margin-left:8px">VALUE</span>` : ''}
          </div>
          
          <div class="pick-info">
            <div>
              <span class="pick-odd">@${p.odds}</span>
            </div>
            <div style="text-align:right">
              <span class="pick-prob">${prob}%</span><br>
              <span class="pick-time">${fmtDate(p.commence_time)}</span>
            </div>
          </div>

          ${kf > 0 ? `
          <div class="pick-kelly">
            <span class="kelly-badge">Kelly ¼</span>
            <span>${kellyPct}% del bankroll</span>
            ${kellyEur ? `<span class="kelly-stake">→ €${kellyEur}</span>` : ''}
          </div>` : `
          <div class="pick-kelly" style="color:#6b7fa3">
            <span class="kelly-badge" style="background:rgba(107,127,163,0.12);color:#6b7fa3">No edge</span>
            <span>Puntata sconsigliata</span>
          </div>`}
          
          <div class="bar-container">
            <div class="bar-fill" style="width: ${prob}%"></div>
          </div>
        </div>`;
    });

    html += `</div>`;
    document.getElementById('topGoalsResults').innerHTML = html;

  } catch (e) {
    showErr("Errore di connessione al backend: " + e.message);
  } finally {
    btn.disabled = false;
    btn.innerHTML = original;
  }
}
</script>
</body>
</html>
